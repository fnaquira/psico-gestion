# Plantilla para despliegue en servidor
# Uso: docker compose -f docker-compose.prod.yml up -d
services:
  app:
    image: psico-gestion:latest
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
